apiVersion: v1
kind: Namespace
metadata:
  name: aegis-waf
  labels:
    app.kubernetes.io/name: aegis-waf
    app.kubernetes.io/part-of: aegis-waf

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aegis-waf-config
  namespace: aegis-waf
data:
  config.toml: |
    [server]
    listen_addr = "0.0.0.0"
    tls_port = 8443
    metrics_port = 9090

    [tls]
    cert_path = "/etc/aegis-waf/certs/tls.crt"
    key_path = "/etc/aegis-waf/certs/tls.key"

    [rate_limit]
    enabled = true
    requests_per_second = 100
    burst_size = 200
    redis_url = "redis://aegis-redis.aegis-waf.svc.cluster.local:6379"

    [waf]
    enabled = true
    rules_path = "/etc/aegis-waf/waf_rules.toml"
    default_action = "block"

    [upstream]
    default = { url = "http://backend.default.svc.cluster.local:8080" }

    [logging]
    level = "info"
    format = "json"
    access_log_path = "/var/log/aegis-waf/access.log"
    error_log_path = "/var/log/aegis-waf/error.log"

  waf_rules.toml: |
    [rules.sql_injection]
    id = "SQLI-001"
    pattern = "(?i)(union\\s+select|select.+from|insert\\s+into|drop\\s+table|--|;--)"
    action = "block"
    severity = "critical"

    [rules.xss]
    id = "XSS-001"
    pattern = "(?i)(<script|javascript:|onerror=|onload=)"
    action = "block"
    severity = "high"

---
apiVersion: v1
kind: Secret
metadata:
  name: aegis-waf-tls
  namespace: aegis-waf
type: kubernetes.io/tls
data: {}
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_YOUR_TLS_CERTIFICATE
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_YOUR_TLS_PRIVATE_KEY
    -----END PRIVATE KEY-----

---
apiVersion: v1
kind: Secret
metadata:
  name: aegis-redis
  namespace: aegis-waf
type: Opaque
stringData:
  redis-password: "REPLACE_WITH_SECURE_REDIS_PASSWORD"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-waf
  namespace: aegis-waf
  labels:
    app.kubernetes.io/name: aegis-waf
    app.kubernetes.io/component: waf-proxy
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aegis-waf
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aegis-waf
        app.kubernetes.io/component: waf-proxy
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: aegis-waf
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: aegis-waf
          image: aegis-waf:latest
          imagePullPolicy: IfNotPresent
          args:
            - run
            - --config
            - /etc/aegis-waf/config.toml
          ports:
            - name: https
              containerPort: 8443
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: AEGIS_CONFIG
              value: /etc/aegis-waf/config.toml
            - name: RUST_LOG
              value: info
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/aegis-waf/config.toml
              subPath: config.toml
              readOnly: true
            - name: waf-rules
              mountPath: /etc/aegis-waf/waf_rules.toml
              subPath: waf_rules.toml
              readOnly: true
            - name: tls-certs
              mountPath: /etc/aegis-waf/certs
              readOnly: true
            - name: logs
              mountPath: /var/log/aegis-waf
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 9090
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: aegis-waf-config
            items:
              - key: config.toml
                path: config.toml
        - name: waf-rules
          configMap:
            name: aegis-waf-config
            items:
              - key: waf_rules.toml
                path: waf_rules.toml
        - name: tls-certs
          secret:
            secretName: aegis-waf-tls
            defaultMode: 0400
        - name: logs
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: aegis-waf
                topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: aegis-waf
  namespace: aegis-waf
  labels:
    app.kubernetes.io/name: aegis-waf
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aegis-waf
  ports:
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: aegis-redis
  namespace: aegis-waf
  labels:
    app.kubernetes.io/name: aegis-redis
    app.kubernetes.io/part-of: aegis-waf
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aegis-redis
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-redis
  namespace: aegis-waf
  labels:
    app.kubernetes.io/name: aegis-redis
    app.kubernetes.io/part-of: aegis-waf
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aegis-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aegis-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - "256mb"
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 384Mi

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aegis-waf-hpa
  namespace: aegis-waf
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aegis-waf
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aegis-waf
  namespace: aegis-waf
