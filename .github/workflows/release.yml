name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: aegis-waf-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: aegis-waf-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: aegis-waf-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: aegis-waf-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation toolchain (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libssl-dev:arm64 || true

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../${{ matrix.artifact }}.tar.gz aegis-waf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  checksums:
    name: Generate SHA256 Checksums
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -name "*.tar.gz" -type f | while read -r f; do
            mv "$f" "$(basename "$f")"
          done
          sha256sum *.tar.gz > checksums-sha256.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: artifacts/checksums-sha256.txt

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, checksums]
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir release-assets
          find artifacts -name "*.tar.gz" -o -name "checksums-sha256.txt" | while read -r f; do
            cp "$f" release-assets/
          done

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Aegis WAF ${{ github.ref_name }}"
          body: |
            ## Aegis WAF ${{ github.ref_name }}

            ### Downloads
            - `aegis-waf-linux-x86_64.tar.gz` - Linux x86_64
            - `aegis-waf-linux-arm64.tar.gz` - Linux ARM64
            - `aegis-waf-macos-x86_64.tar.gz` - macOS x86_64
            - `aegis-waf-macos-arm64.tar.gz` - macOS ARM64

            SHA256 checksums are available in `checksums-sha256.txt`.
          files: |
            release-assets/*.tar.gz
            release-assets/checksums-sha256.txt
          generate_release_notes: true
